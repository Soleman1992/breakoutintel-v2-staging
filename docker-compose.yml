version: "3.9"

services:
  # ── NGINX Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bi_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - bi_net

  # ── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bi_frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
      - NEXT_PUBLIC_APP_NAME=BreakoutIntel
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - bi_net

  # ── Node.js Backend + WebSocket ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bi_backend
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - YAHOO_FINANCE_CACHE_TTL=15
      - NSE_SCRAPE_INTERVAL=30000
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bi_net

  # ── Data Worker (Scanner / News / VIX) ───────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: bi_worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SCAN_INTERVAL_MS=30000
      - NEWS_INTERVAL_MS=120000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bi_net

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bi_postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-breakoutintel}
      - POSTGRES_USER=${POSTGRES_USER:-biuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/src/models/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bi_net

  # ── Redis (Cache + Pub/Sub for WebSocket) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bi_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bi_net

  # ── Certbot (Let's Encrypt SSL — run once manually) ───────────────────────
  certbot:
    image: certbot/certbot
    container_name: bi_certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    profiles:
      - ssl
    command: >
      certonly --webroot
      --webroot-path=/var/www/certbot
      --email ${SSL_EMAIL}
      --agree-tos
      --no-eff-email
      -d ${DOMAIN}

volumes:
  pg_data:
  redis_data:
  certbot_webroot:

networks:
  bi_net:
    driver: bridge
