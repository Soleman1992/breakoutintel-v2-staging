# BreakoutIntel V2 — Render.com Blueprint
# FREE TIER — single web service, no worker needed
# Deploy: render.com → New → Blueprint → connect this repo

services:
  - type: web
    name: breakoutintel-v2
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: YAHOO_FINANCE_CACHE_TTL
        value: "15"
      - key: SCAN_INTERVAL_MS
        value: "45000"
