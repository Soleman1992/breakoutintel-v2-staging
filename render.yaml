services:
  - type: web
    name: breakoutintel-api
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 4000

      - key: DATABASE_URL
        fromDatabase:
          name: breakoutintel-db
          property: connectionString

      - key: REDIS_URL
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: ANTHROPIC_API_KEY
        sync: false

      - key: YAHOO_FINANCE_CACHE_TTL
        value: "15"

      - key: SCAN_INTERVAL_MS
        value: "45000"

  - type: web
    name: breakoutintel-frontend
    env: node
    region: singapore
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production

      - key: NEXT_PUBLIC_API_URL
        value: https://breakoutintel-api.onrender.com

      - key: NEXT_PUBLIC_APP_NAME
        value: BreakoutIntel

  - type: worker
    name: breakoutintel-worker
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/worker.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: breakoutintel-db
          property: connectionString

      - key: REDIS_URL
        sync: false

      - key: ANTHROPIC_API_KEY
        sync: false

      - key: SCAN_INTERVAL_MS
        value: "45000"

databases:
  - name: breakoutintel-db
    databaseName: breakoutintel
    user: biuser
    region: singapore
    plan: free
