# render.yaml — Deploy BreakoutIntel on Render.com (FREE TIER)
#
# How to use:
# 1. Push this repo to GitHub
# 2. Go to render.com → New → Blueprint
# 3. Connect your GitHub repo
# 4. Render auto-detects this file and creates all services
# 5. Set environment variables in Render dashboard
#
# Free tier limits:
#   - Web services: 512MB RAM, spins down after 15min inactivity (first req ~1min)
#   - PostgreSQL: 1GB storage, 90-day free trial then $7/mo
#   - Redis: Use Upstash (free 10k req/day) — add REDIS_URL manually
#
# For 100% free persistent hosting: use Railway ($5 trial) or Oracle Free Tier VPS

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: breakoutintel-api
    env: node
    region: singapore  # Closest to India for NSE latency
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: breakoutintel-db
          property: connectionString
      - key: REDIS_URL
        sync: false  # Set manually from Upstash
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually
      - key: YAHOO_FINANCE_CACHE_TTL
        value: 15
      - key: SCAN_INTERVAL_MS
        value: 45000

  # ── Frontend ──────────────────────────────────────────────────────────────
  - type: web
    name: breakoutintel-frontend
    env: node
    region: singapore
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: breakoutintel-api
          property: host
          envVarKey: NEXT_PUBLIC_API_URL
      - key: NEXT_PUBLIC_APP_NAME
        value: BreakoutIntel

  # ── Worker (scanner runs as background job) ───────────────────────────────
  - type: worker
    name: breakoutintel-worker
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/worker.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: breakoutintel-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SCAN_INTERVAL_MS
        value: 45000

databases:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  - name: breakoutintel-db
    databaseName: breakoutintel
    user: biuser
    region: singapore
    plan: free  # 90-day free, then $7/mo or use Supabase (free 500MB)
